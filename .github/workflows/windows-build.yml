name: Build Windows Artifact

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11

      - name: Install dependencies with vcpkg
        run: |
          vcpkg install zlib:x64-windows-static
          vcpkg install curl[core,sspi]:x64-windows-static
          vcpkg install libzip[core,bzip2,lzma,zstd]:x64-windows-static

      - name: Configure CMake
        run: >-
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_TOOLCHAIN_FILE=${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake
          -DVCPKG_TARGET_TRIPLET=x64-windows-static

      - name: Build
        run: cmake --build build --config Release --target Unlocker

      - name: Create ZIP artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path build/Release/Unlocker.exe -DestinationPath dist/auto-unlocker-windows.zip -Force

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: auto-unlocker-windows
          path: dist/auto-unlocker-windows.zip
          if-no-files-found: error
